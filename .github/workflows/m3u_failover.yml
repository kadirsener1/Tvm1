name: M3U Failover Birleştirici

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'  # Her gün 06:00 Türkiye saati
  push:
    paths:
      - 'input/**'
      - 'scripts/**'

jobs:
  merge-m3u:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Repo'yu Çek
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🐍 Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Bağımlılıkları Kur
        run: pip install requests
      
      - name: 📁 Klasörleri Oluştur
        run: |
          mkdir -p input
          mkdir -p output
      
      - name: 🔄 M3U Birleştir
        run: python scripts/m3u_birlestir.py
      
      - name: 📤 Değişiklikleri Gönder
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output/
          git diff --staged --quiet || git commit -m "🔄 M3U güncellendi - $(date +'%Y-%m-%d %H:%M')"
          git push
